name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate tag matches package.json version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$version" != "$pkg_version" ]; then
            echo "::error::Tag $TAG does not match package.json version $pkg_version"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          notes=$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md)
          if [ -z "$notes" ]; then
            echo "::error::No CHANGELOG section found for $TAG"
            exit 1
          fi
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$notes"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          gh release create "$TAG" --title "$TAG" --notes "$NOTES" --verify-tag

      - name: Move floating major-version tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          major="v${version%%.*}"
          echo "Moving $major to point at $TAG"
          git tag -f "$major" "$TAG"
          git push origin "$major" --force
